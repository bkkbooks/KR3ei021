body:
  text: 産後編上卷産後總論凡病起於血氣之衰脾胃之虛而産後尤甚是以丹溪先生論産後必大補氣血為先雖有他症以末治之斯言盡治産之大旨若能擴充立方則治産可無過矣夫産後憂驚勞倦氣血暴虛諸症乘虛易入如有氣毋專耗散有食毋專消導熱不可用芩連寒不可用桂附寒則血塊停滯熱則新血崩流至若中虛外感見三陽表症之多似可汗也在産後而用麻黃則重竭其陽見三陰里症之多似可下也在産後而用承氣則重亡陰血耳聾脅痛乃腎虛惡露之停休用柴胡譫語出汗乃元弱似邪之症非同胃實厥由陽氣之衰無分寒熱非大補不能回陽而起弱痙因陰血之虧不論剛柔非滋榮不能舒筋而活終乍寒乍熱發作無期症似瘧也若以瘧治遷延難愈言論無倫神不守舍病似邪也若以邪治危亡可待去血過多而大便燥結肉蓯蓉加於生化非潤腸承氣之能通去汗過多而小便短澀六君子倍加參芪必生津助液之可利加參生化湯頻服救産後之危長生活命丹屢用蘇絶谷之人㿗疝脫肛多是氣虛下陷補中益氣之方口噤拳攣乃因血燥類風加參生化之劑産戶入風而痛甚服宜羌活養榮湯玉門傷涼而不閉洗宜蟆兒黃硫散怔忡驚悸生化湯加以定志似邪恍惚安神丸助以歸脾因氣而悶滿虛煩生化湯加木香為佐因食而噯酸惡食六君子加神麯麥芽為良蘇木莪朮大能破血青皮枳殼最消滿脹一應耗氣破血之劑汗吐宣下之法只可施諸壯實豈宜用於胎産大抵新産後先問惡露如何塊痛未除不可遽加參朮腹中痛止補中益氣無疑至若亡陽脫汗氣虛喘促頻服加參生化湯是從權也又如亡陰火熱血崩厥暈速煎生化原方是救急也王太僕云治下補下治以急緩緩則道路達而力微急則氣味厚而力重故治産當遵丹溪而固本服法宜效太僕以頻加凡付生死之重寄須著意於極危欲求俯仰之無虧用存心於愛物此雖未盡産症之詳然所聞一症皆援近鄉治驗為據亦未必無小補云産前後方症宜忌正産正産者有腹或痛或止腰脅痠痛或勢急而胞未破名弄胎服八珍湯加香附自安有胞破數日而痛尚緩亦服上藥俟之傷産傷産者胎未足月有所傷動或腹痛臍痛或服催生藥太早或産母努力太過逼兒錯路不能正産故臨月必舉動從容不可多睡飽食飲酒但覺腹中動轉即正身仰臥待兒轉順與其臨時費力不如先時慎重調産調産者産母臨月擇穩婆辦器用備參藥産時不可多人喧鬧二人扶身或憑物站心煩用滾水調白蜜一匙獨活湯更妙或飢服糜粥少許勿令飢渴有生息未順者只説有雙胎或胎衣不下勿令産母驚恐催生催生者因坐草太早困倦難産用八珍湯稍佐以香附乳香以助血氣胞衣早破漿血已乾亦用八珍湯凍産凍産者天寒血氣凝滯不能速生故衣裳宜厚産室宜暖背心下體尤要熱産熱産者暑月宜溫涼得宜若産室人衆熱氣蒸逼致頭痛面赤昏暈等症宜飲清水少許以解之然風雨陰涼亦當避之橫産橫産者兒居母腹頭上足下産時則頭向下産母若用力逼之胎轉至半而橫當令産母安然仰臥令其自順穩婆以中指挾其肩勿使臍帶羈絆用催生藥努力即生當歸紫蘇各三錢長流水煎服即下一方用好京墨服之即下一方用益母草六兩濃煎加童便一大杯調服即下盤腸産盤腸産者産則子腸先出然後生子其腸或未即收以萆麻子四十九粒研碎塗頭上腸收急急洗去遲則有害又方只用四十粒去皮研為膏塗頂中收即拭之難産難産者交骨不開不能生産也服加味芎歸湯良久即下小川芎一兩當歸一兩敗龜板一個酒炙婦人髮灰一握水一鍾煎七分服歌括交骨不開難産生酒炙龜版當歸芎外加髮灰一握整煎服胎兒離玉宮死産死産者子死腹中也驗母舌青黑其胎已死先用平胃散一服酒水各一鍾煎八分投朴硝煎服即下用童便亦好後用補劑調理歌括子死腹中名死産母舌青黑可決斷酒水共煎平胃散再投朴硝下胎元下胞胞衣不下用滾酒送下失笑散一劑或益母丸或生化湯送鹿角灰一錢或以産母髮入口作吐胞衣即出有氣虛不能送出者腹必脹痛單用生化湯全當歸一兩川芎三錢白朮一錢香附一錢加人參三錢更妙用水煎服一方用萆麻子二兩雄黃二錢研膏塗足下湧泉穴衣下急速洗去平胃散南蒼朮米泔水浸炒厚朴薑炒陳皮炙草各二錢共為粗末或水煎或酒煎煎成時加朴硝二錢再煎一二沸溫服失笑散五靈脂蒲黃俱研為細末每服三錢熱酒下斷臍斷臍必以綿裹咬斷為妙如遇天寒或因難産母子勞倦宜以大麻油紙拈徐徐燒斷以助元氣雖兒已死令暖氣入臍多得生切勿以刀斷之滑胎散臨月常服數劑以便易生當歸三五錢川芎五七錢杜仲二錢熟地三錢枳殼七分山藥二錢水二鍾煎八分食前溫服如氣虛體弱人加人參白朮隨宜服之如便實多帶滯者加牛膝二錢歌括滑胎散用當歸片川芎熟地山藥研杜仲枳殼同加入臨月常服效如仙治産祕驗良方治橫生逆産至數日不下一服即下有未足月忽然胎動一服即安或臨月先服一服保護無虞更能治胎死腹中及小産傷胎無乳者一服即如原體全當歸川芎各一錢五分川貝母一錢去心荊芥穗黃芪各八分厚朴薑炒菟絲子一錢二分蘄艾紅花各七分甘草五分羌活六分麵炒枳殼六分麵炒白芍一錢二分冬月不用上十三味只用十二味不可加減安胎去紅花催生去蘄艾用井水鍾半薑三片為引熱服渣用水一鍾煎半鍾熱服如不好再用水一鍾煎半鍾服之即效不用二劑歌括治産祕驗一良方臨月先服保無殃橫生逆産傷胎症煎服一劑效便彰歸芎川貝芥穗良黃芪紅花厚朴羌艾葉枳殼菟絲子芍藥甘草引用薑催生兔腦丸治橫生逆産神效臘月兔腦髓一個母丁香一個乳香一錢另研麝香一分兔腦為丸芡實大陰乾密封用時以溫酒送下一丸歌括催生兔腦臘月良乳香麝香母丁香兔腦為丸芡實大密封用時溫酒嘗奪命丹臨産未産時目翻口噤面黑唇青口中吐沫命在須臾若臉面微紅子死母活急用蛇退蠶故子燒灰不存性髮灰一錢乳香五分共為細末酒下歌括奪命丹用蛇退良蠶子髮灰與乳香共為細末酒送下子死能保母命康加味芎歸湯治子宮不收産戶不閉人參二錢黃芪一錢當歸二錢升麻八分川芎一錢炙草四分五味子十五粒再不收加半夏八分白芍八分酒炒歌括子宮不收産門張急用加味芎歸湯人參黃芪炙甘草升麻五味共煎嘗新産治法生化湯先連進二服若胎前素弱婦人見危症熱症墮胎不可拘帖數服至病退乃止若産時勞甚血崩形脫即加人參三四錢在內頻服無虞若氣促亦加人參加參於生化湯者血塊無滯不可以參為補而弗用也有治産不用當歸者見偏之甚此方處置萬全必無一失世以四物湯治産地黃性寒滯血芍藥微酸無補伐傷生氣誤甚産後用藥十誤一因氣不舒而誤用耗氣順氣等藥反增飽悶陳皮用至五分禁枳實厚朴二因傷氣而誤用消導反損胃氣至絶谷禁枳殼大黃蓬稜麯朴三因身熱而誤用寒涼必致損胃增熱禁芩連梔柏升柴四因日內未曾服生化湯勿用參芪朮以致塊痛不消五毋用地黃以滯惡露六毋用枳殼牛膝枳實以消塊七便祕毋用大黃芒硝八毋用蘇木稜蓬以行塊芍藥能伐氣不可用九毋用山楂湯以攻塊定痛而反損新血十毋輕服濟坤丹以下胎下胞産後危疾諸症當頻服生化湯隨症加減照依方論産後寒熱凡新産後榮衛俱虛易發寒熱身痛腹痛決不可妄投發散之劑當用生化湯為主稍佐發散之藥産後脾虛易於停食以致身熱世人見有身熱便以為外感遽然發汗速亡甚矣當於生化湯中加扶脾消食之藥大抵産後先宜補血次補氣若偏補氣而專用參芪非善也産後補虛用參芪芎歸白朮陳皮炙草熱輕則用茯苓淡滲之藥其熱自除重則加乾薑或云大熱而用薑何也曰此熱非有餘之熱乃陰虛內生熱耳蓋乾薑能入肺分利肺氣又能入肝分引衆藥生血然必與陰血藥同用之産後惡寒發熱腹痛者當主惡血若腹不痛非惡血也産後寒熱口眼歪邪此乃氣血虛甚以大補為主左手脈不足補血藥多於補氣藥右手脈不足補氣藥多於補血藥切不可用小續命等發散之藥胎前患傷寒疫症瘧疾墮胎等症胎前或患傷寒疫症瘧疾熱久必致墮胎墮後愈增熱因熱消陰血而又繼産失血故也治者甚勿妄論傷寒瘧疫未除誤投梔子豉湯柴芩連柏等藥雖或往來潮熱大小便祕五苓承氣等藥斷不可用只重産輕邪大補氣血頻服生化湯如形脫氣脫加生脈散以防血暈蓋川芎味辛能散乾薑能除虛火雖有便祕煩渴等症只多服生化湯自津液生而二便通矣若熱用寒劑愈虛中氣誤甚産後諸症治法血塊此症勿拘古方妄用蘇木蓬稜以輕人命其一應散血方破血藥俱禁用雖山楂性緩亦能害命不可擅用惟生化湯系血塊聖藥也生化湯原方當歸八錢川芎三錢桃仁十四粒去皮尖研黑薑五分炙草五分用黃酒童便各半煎服歌括治血塊用生化湯當歸川芎五分薑十粒桃仁五分草引用黃酒童便良又益母丸鹿角灰就用生化湯送下一錢外用烘熱衣服暖和塊痛處雖大暑亦要暖和塊痛處有氣不運而暈迷厥切不可妄説惡血搶心只服生化湯為妙俗有生地牛膝行血山稜蓬朮敗血山楂沙糖消塊蘄艾椒酒定痛反致昏暈等症切不可妄用二三四日內覺痛減可揉乃虛痛也宜加參生化湯如七日內或因寒涼食物結塊痛甚者加入肉桂八分一作三分於生化湯內如血塊未消不可加參芪用之則痛不止總之慎勿用峻利藥勿多飲薑椒艾酒頻服生化湯行氣助血外用熱衣以暖腹如用紅花以行之蘇木牛膝以攻之則誤其胎氣脹用烏藥香附以順之枳殼厚朴以舒之甚有青皮枳實蘇子以下氣定喘芩連梔子黃柏以退熱除煩至於血結更甚反用承氣湯下之而愈結汗多小便短澀反用五苓散通之而愈祕非徒無益而又害之也凡兒生下或停血不下半月外尚痛或外加腫毒高寸許或身熱減飲食倦甚必用生化湯加三稜蓬朮肉桂等攻補兼治其塊自消如虛甚食少泄瀉只服此帖定痛且健脾胃進食止瀉然後服消塊湯加味生化湯治血塊日久不消半月後方可用之川芎一錢當歸三錢肉薑四分桃仁十五粒三稜醋炒六分元胡六分肉桂六分炙草四分歌括加味生化歸薑芎桃仁元胡荊三稜肉桂炙草同煎服産後半月此方靈血暈分娩之後眼見黑花頭眩昏暈不省人事者一因勞倦甚而氣竭神昏二因大脫血而氣欲絶三因痰火乘虛泛上而神不守當急服生化湯二三帖外用韭菜細切納有嘴瓶中用滾醋二鍾衝入瓶內急衝産母鼻中即醒若偏信古方認為惡血搶心而輕用散血之劑認為疫火而用無補消降之方誤甚矣如暈厥牙關緊閉速煎生化湯挖開口將鵝毛探喉酒盞盛而灌之如灌下腹中漸溫暖不可拘帖數外用熱手在單衣上從心揉按至腹常熱火暖之一兩時服生化湯四帖完即神清始少緩藥方進粥服至十服而安故犯此者速灌藥火暖不可棄而不救若在冬月婦人身欠暖亦有大寒臨産時必預煎生化湯預燒稱錘硬石子候兒下地連服二三貼又産婦枕邊行醋韭投醋瓶之法決無暈症又兒生時閣家不可喜子而慢母産母不可顧子忘倦又不可産訖即臥或忿怒逆氣皆致血暈慎之慎之加味生化湯治産後三等血暈症川芎三錢當歸六錢黑薑四分桃仁十粒炙草五分荊芥四分炒黑大棗水煎服歌括産後血暈不識人勞倦氣竭神志昏或因脫血氣欲絶痰火泛上不守神血暈加味生化湯歸芎荊草桃仁薑韭葉納入有嘴瓶滾醋衝入熏鼻腔勞倦甚而暈及血崩氣脫而暈並宜速灌兩服如形色脫或汗出而脫皆急服一帖即加人參三四錢一加肉桂四分決不可疑參為補而緩服痰火乘虛泛上而暈方內加橘紅四分虛甚加人參二錢肥人多痰再加竹瀝七分薑汁少許總不可用稜朮破血等方其血塊痛甚兼送益母丸或鹿角灰或元胡散或獨勝散上消血塊方服一服即效不必易方從權救急加參生化湯治産後形色脫暈或汗多脫暈人參三錢有倍加至五錢者川芎二錢當歸五錢炙草四分桃仁十粒炮薑四分大棗水煎服脈脫形脫將絶之症必服此方加參四五錢頻頻灌之産後血崩血暈兼汗多宜服此方無汗不脫只服本方不必加參左尺脈脫亦加參此方治産後危急諸症可通用一晝一夜必須服三四劑若照常症服豈能接將絶之氣血扶危急之變症耶産後一二日血塊痛雖未止産婦氣血虛脫或暈或厥或汗多或形脫口氣漸涼煩渴不止或氣喘急無論塊痛從權用加參生化湯病勢稍退又當減參且服生化湯加減法血塊痛甚加肉桂七分渴加麥冬一錢五味十粒汗多加麻黃根一錢如血塊不痛加炙黃芪一錢以止汗傷飯食麵食加炒神麯一錢麥芽五分炒傷肉食加山楂五個砂仁四錢炒歌括脈脫形脫症將絶血崩血暈兼汗多産後諸般危急症加參生化最穩妥氣血虛脫生化湯加入人參服之良血塊痛甚加肉桂渴加麥味汗麻黃根血塊不痛炙黃芪神麯麥芽醫食傷若傷肉食加楂砂隨症加減效更彰厥症婦人産有用力過多勞倦傷脾故逆冷而厥氣上胸滿脈去形脫非大補不可豈錢數川芎當歸能回陽復神乎必用加參生化湯倍參進二劑則氣血旺而神自生矣厥自止矣若服藥而反渴另有生脈散獨參代茶飲救臟之燥如四肢逆冷又泄痢類傷寒陰症又難用四逆湯必用倍參生化湯加附子一片可以回陽止逆又可以行參歸之力立二方於下分先後加參生化湯治産後發厥塊痛未止不可加芪朮川芎二錢當歸四錢炙草五分炮薑四分一作黑薑桃仁十粒去皮尖研人參二錢棗水煎進二服滋榮益氣復神湯治産後發厥問塊痛已除可服此方人參三錢黃芪一錢蜜炙白朮一錢土炒當歸三錢炙草四分陳皮四分五味十粒川芎一錢熟地一錢麥芽一錢棗一枚水煎服手足冷加附子五分汗多加麻黃根一錢熟棗仁一錢妄言妄見加益智柏子仁龍眼肉大便實加肉蓯蓉二錢大抵産後暈厥二症相類但暈在臨盆症急甚於厥宜頻服生化湯幾帖塊化血旺神清暈止若多氣促形脫等症必加參芪厥在分娩之後宜倍參生化湯止厥以復神並補氣血也非如上偏補氣血而可愈也要知暈有塊痛芪朮不可加厥症若無塊痛芪朮地黃並用無疑也歌括婦人生産用力多勞倦傷脾肢冷厥氣上胸滿脫去形加參生化神自和産後發厥塊痛消滋榮益氣復神好麥芽五味陳熟地參芪朮草歸芎棗血崩産後血大來審血色之紅紫視形色之虛實如血紫有塊乃當去其敗血也止留作痛不可論崩如鮮紅之血乃是驚傷心不能生血怒傷肝不能藏血勞傷脾不能統血俱不能歸經耳當以崩治先服生化湯幾帖則行中自有補若形脫汗多氣促宜服倍參生化湯幾帖以益氣非棕灰之可以止如産後半月外崩又宜升舉大補湯治之此症虛極服藥平穩未見速效須二十帖後諸症頓除生血止崩湯治産後血崩川芎一錢當歸四錢黑薑四分炙草五分桃仁十粒荊芥五分炒黑烏梅五分煅灰蒲黃五分炒棗水煎忌薑椒熱物生冷凡止崩用荊芥俱宜炒黑鮮紅血大來荊芥穗炒黑白芷各五分血竭形敗加參三四錢汗多氣促亦加參三四錢無汗形不脫氣促只服生化湯多服則血自平有言歸芎但能活血甚誤歌括産後血崩不歸經驚傷心而血不生怒傷肝而血不藏勞傷脾而血不統生血止崩芎歸薑炙草桃仁炒蒲黃荊芥炒黑烏梅煅棗水煎服獲效良升舉大補湯滋榮益氣如有塊動只服前方芪朮勿用黃芪白朮陳皮各四分人參二錢炙草升麻各四分當歸熟地各二錢麥冬一錢川芎一錢白芷四分黃連三分炒荊芥穗四分炒黑汗多加麻黃根一錢浮麥炒一小撮大便不通加肉蓯蓉一錢禁用大黃氣滯磨木香三分痰加貝母六分竹瀝薑汁少許寒嗽加杏仁十粒桔梗五分知母一錢驚加棗仁柏子仁各一錢傷飯加神麯麥芽各一錢傷肉食加山楂砂仁各八分俱加棗水煎身熱不可加連柏傷食怒氣均不可專用耗散無補藥凡年老虛人患崩宜升舉大補湯眉批按症虛極注中有身熱不可加連柏云云後復神湯項下注有宜用此湯少佐黃連墜火云云設無火可墜此方內並無熱藥無須反佐恐黃連未可輕用此處最宜詳慎又注中寒嗽加有知母既系寒嗽知母亦未可擅用此條疑原刊寒字有誤歌括産後半月發血崩滋榮益氣法最靈此症極虛難速效二十帖後方見功升舉大補朮芪參炙草升芷當歸陳熟地麥芎連芥穗汗多宜加麻黃根氣短似喘因血脫勞甚氣無所恃呼吸止息違其常度有認為痰火反用散氣化痰之方誤人性命當以大補血為主如有塊不可用參芪朮無塊方可用本方去桃仁加熟地並附子一片足冷加熟附子一錢及參朮陳皮接續補氣養榮湯加參生化湯治分娩後即患氣短者有塊不可加芪朮川芎二錢當歸四錢炙草五分黑薑四分桃仁十粒去皮尖研人參二錢引加棗一枚連進二三帖後再用後方補氣養榮湯治産後氣短促血塊不痛宜服此方黃芪一錢白朮一錢當歸四錢人參三錢陳皮四分炙草四分熟地二錢川芎二錢黑薑四分如手足冷加熟附子一錢汗多加麻黃根一錢浮麥一小撮渴加麥冬一錢五味子十粒大便不通加肉蓯蓉一錢麻仁一撮傷麵飯加炒神麯一錢炒麥芽一錢傷肉食加山楂砂仁各五分眉批按麥芽有回乳之害用者慎之黃芪白朮一作各二錢凡止汗用浮麥宜炒歌括産後血脫又勞倦氣無所恃短似喘散氣化痰誤人命大補氣血可獲安加參生化芎歸參炙草黑薑炒桃仁氣短似喘急投用引加大棗效如神補氣養榮用參芪歸芎白朮與陳皮炙草黑薑熟地黃血塊不痛此方宜妄言妄見由氣血虛神魂無依也治當論塊痛有無緩急若塊痛未除先服生化湯二三帖痛止繼服加參生化湯或補中益氣湯加安神定志丸調服之若産日久形氣俱不足即當大充氣血安神定志服至藥力充足其病自愈勿謂邪祟若噴以法水驚之每至不救屢治此症服藥至十數帖方效病虛似邪欲除其邪先補其虛先調其氣次論諸病此古人治産後虛症及年老虛喘弱人妄言所當用心也安神生化湯治産後塊痛未止妄言妄見症未可用芪朮川芎一錢柏子仁一錢人參一二錢當歸二三錢茯神二錢桃仁十二粒黑薑四分炙草四分益智八分炒陳皮三分棗水煎滋榮益氣復神湯塊痛已止妄言妄見服此方即愈黃芪白朮麥冬川芎柏子仁茯神益智各一錢陳皮三分人參熟地各二錢炙草四分五味子十粒棗仁十粒一錢蓮子八枚元肉八個棗水煎服産後血崩血脫氣喘氣脫神脫妄言雖有血氣陰陽之分其精散神去一也比暈後少緩亦危症也若非厚藥頻服失之者多矣誤論氣實痰火者非也新産有血塊痛並用加參生化湯行中有補斯免滯血血暈之失也其塊痛止有宜用升舉大補湯少佐黃連墜火以治血脫安血歸經也有宜用倍參補中益氣湯少佐附子助參以治氣脫攝氣歸淵也有宜用滋榮益氣復神湯少佐痰劑以清心火安君主之官也歌括産後日久氣血虛妄見妄言神無依虛病似邪欲除之先補其虛調其氣安神生化柏子仁當歸川芎與人參桃仁黑薑陳皮草茯神益智棗水吞滋榮益氣復神湯參芪朮芎麥地黃茯神益智柏棗仁陳草五味萸蓮嘗傷食新産後禁膏粱遠厚味如飲食不節必傷脾胃治當扶元溫補氣血健脾胃審傷何物加以消導諸藥生化湯加神麯麥芽以消麵食加山楂砂仁以消肉食如寒冷之物加吳萸肉桂如産母虛甚加人參白朮又有塊然後消補並治無有不安者屢見治者不重産後之弱惟知速消傷物反損真氣益增滿悶可不慎哉加味生化湯治血塊未消服此以消食川芎二錢當歸五錢黑薑四分炙草五分桃仁十粒問傷何物加法如前煎服健脾消食生化湯治血塊已除服此消食川芎一錢人參當歸各二錢白朮一錢半炙草五分審傷何物加法如前如停寒物日久脾胃虛弱恐藥不能運用可用揉按炒神麯尉之更妙凡傷食誤用消導藥反絶粥幾日者宜服此方歌括新産之後禁膏粱飲食不節脾胃傷治當扶元補氣血審傷何物調處方産後傷食生化湯麵食神麥投之良肉傷砂楂冷萸桂虛甚參朮亦可嘗忿怒産後怒氣逆胸膈不利血塊又痛宜用生化湯去桃仁服時磨木香二分在內則塊化怒散不相悖也若輕産重氣偏用木香烏藥枳殼砂仁之類則元氣反損益增滿悶又加怒後即食胃弱停悶當審何物治法如前慎勿用木香檳榔丸流氣引子之方使虛弱愈甚也木香生化湯治産後血塊已除因受氣者川芎二錢當歸六錢陳皮三分黑薑四分服時磨木香二分在內此方減桃仁用木香陳皮前有減乾薑者詳之健脾化食散氣湯治受氣傷食無塊痛者白朮二錢當歸二錢川芎一錢黑薑四分人參二錢陳皮三錢審傷何物加法如前大抵産後忿怒氣逆及停食二症善治者重産而輕怒氣消食必以補氣血為先佐以調肝順氣則怒鬱散而元不損佐以健脾消導則停食行而思谷矣若專理氣消食非徒無益而又害之眉批陳皮一作三分又有炙草四分存參歌括産後怒氣逆胸膈血塊又痛生化湯宜去桃仁加木香塊化怒散保無殃健脾化食散氣湯朮歸川芎和黑薑人參陳皮可補氣鬱怒消散氣無傷類瘧産後寒熱往來每日應期而發其症似瘧而不可作瘧治夫氣血虛而寒熱更作元氣虛而外邪或侵或嚴寒或極熱或晝輕夜重或日晡寒熱絶類瘧症治當滋榮益氣以退寒熱有汗急宜止或加麻黃根之類只頭有汗而不及於足乃孤陽絶陰之危症當加地黃當歸之類如陽明無惡寒頭痛無汗且與生化湯加羌活防風蓮鬚蔥白數根以散之其柴胡清肝飲等方常山草果等藥俱不可用滋榮養氣扶正湯治産後寒熱有汗午後應期發者人參二錢炙黃芪白朮川芎熟地麥冬麻黃根各一錢當歸三錢陳皮四分炙草五分棗水煎歌括産後寒熱往來頻應期而發汗雨淋似瘧不可作瘧治氣血兩虛是病因滋榮養氣朮芪參當歸川芎熟地陳麥冬炙草棗為引有汗加入麻黃根加減養胃湯治産後寒熱往來頭痛無汗類瘧者炙草四分白茯苓一錢半夏八分製川芎一錢陳皮四分當歸二錢蒼朮一錢藿香四分人參一錢薑引煎服有痰加竹瀝薑汁半夏神麯弱人兼服河車丸凡久瘧不愈兼服參朮膏以助藥力參朮膏白朮一斤米泔浸一宿銼焙人參一兩用水六碗煎二碗再煎二次共汁六碗合在一處將藥汁又熬成一碗空心米湯化半酒盞歌括産後頭痛身無汗寒熱往來是病源芎歸苓藿蒼朮半炙草陳皮人參煎有痰竹瀝薑夏曲弱人兼服河車丸久瘧不愈參朮膏空心湯化半酒盞類傷寒二陽症産後七日內發熱頭痛惡寒毋專論傷寒為太陽症發熱頭痛脅痛毋專論傷寒為少陽症二症皆由氣血兩虛陰陽不和而類外感治者慎勿輕産後熱門而用麻黃湯以治類太陽症又勿用柴胡湯以治類少陽症且産母脫血之後而重發其汗虛虛之禍可勝言哉昔仲景云亡血家不可發汗丹溪云産後切不可發表二先生非謂産後真無傷寒之兼症也非謂麻黃湯柴胡湯之不可對症也誠恐後輩學業偏門而輕産執成方而發表耳誰知産後真感風感寒生化中芎薑亦能散之乎加味生化湯治産後三日內發熱頭痛症川芎防風各一錢當歸三錢炙草四分桃仁十粒羌活四分眉批一本無桃仁有黑薑四分查刊本去桃仁然必須問有塊痛與否方可議去服二帖後頭仍痛身仍熱加白芷八分細辛四分如發熱不退頭痛如故加蓮鬚蔥五個人參三錢産後敗血不散亦能作寒作熱何以辨之曰時有刺痛者敗血也但寒熱無他症者陰陽不和也刺痛用當歸乃和血之藥若乃積血而刺痛者宜用紅花桃仁歸尾之類歌括産後六七日當中發熱惡寒頭亦痛氣血兩虛陰陽捍類似外感表無功加味生化用防風炙草羌活桃歸芎二劑頭痛身仍熱再加白芷細辛蔥類傷寒三陰症潮熱有汗大便不通毋專論為陽明症口燥咽乾而渴毋專論為少陰症腹滿液乾大便實毋專論為太陽症又汗出譫語便閉毋專論為腸胃中燥糞宜下症數症多由勞倦傷脾運化稽遲氣血枯稿腸腑燥涸乃虛症類實當補之症治者勿執偏門輕産而妄議三承氣湯以治類三陰之症也間有少壯産後妄下幸而無妨虛弱産婦亦復妄下多致不救屢見妄下成膨誤導反結又有血少數日不通而即下致瀉不止者危哉婦人良方云産後大便祕若計其日期飯食數多即用藥通之禍在反掌必待腹滿覺脹欲去不能者反結在直腸宜用豬膽汁潤之若日期雖久飲食如常腹中如故只用補劑而已若服苦寒疏通反傷中氣通而不止或成痞滿誤矣養正通幽湯治産後大便祕結類傷寒三陰症川芎二錢半當歸六錢炙草五分桃仁十五粒麻仁二錢炒肉蓯蓉酒洗去甲一錢汗多便實加黃芪一錢麻黃根一錢人參二錢口燥渴加人參麥冬各一錢腹滿溢便實加麥冬一錢枳殼六分人參二錢蓯蓉一錢汗出譫語便實乃氣血虛竭精神失守宜養榮安神加茯神遠志蓯蓉各一錢人參白朮各二錢黃芪白芷各一錢柏子仁一錢以上數等大便燥結症非用當歸人參至斤數難取功效大抵産後虛中傷寒口傷食物外症雖見頭痛發熱或脅痛腰痛是外感宜汗猶當重産亡血禁汗惟宜生化湯量為加減調理無失又如大便祕結猶當重産亡血禁下宜養正助血通滯則穩當矣又潤腸粥治産後日久大便不通芝麻一升研末和米二合煮粥食腸潤即通歌括勞倦傷脾運化慢氣血枯稿腸腑乾虛症類實宜用補治者處方勿執偏養正通幽腸可潤川芎當歸麻桃仁蓯蓉炙草同煎服汗多參芪麻黃根産後大便久不通潤腸粥服最靈應芝麻一升研成末和米煮粥樹奇功類中風産後氣血暴虛百骸少血濡養忽然口噤牙緊手足筋脈拘搐等症類中風癇痙雖虛火泛上有痰皆當以末治之勿執偏門而用治風消痰之方以重虛産婦也治法當先服生化湯以生旺新血如見危症三服後即用加參益氣以救血脫也如有痰火少佐橘紅炒芩之類竹瀝薑汁亦可加之黃柏黃連切不可並用慎之滋榮活絡湯治産後血少口噤項強筋搐類風症川芎一錢半當歸熟地人參各二錢黃芪茯神天麻各一錢炙草陳皮荊芥穗防風羌活各四分黃連八分薑汁炒有痰加竹瀝薑汁半夏渴加麥冬葛根有食加山楂砂仁以消肉食神麯麥芽以消飯食大便閉加肉蓯蓉一錢半汗多加麻黃根一錢驚悸加棗仁一錢天麻丸治産後中風恍惚語澀四肢不利天麻一錢防風一錢川芎七分羌活七分人參遠志柏子仁山藥麥冬各一錢棗仁一兩細辛一錢南星麯八分石菖蒲一錢研細末煉蜜為丸辰砂為衣清湯下六七十丸眉批一本棗仁用一錢細辛用四分存參歌括産後口噤牙緊關項強筋搐似瘋癇勿用治風消痰藥頻服生化益血源滋榮活絡熟地黃參芪茯神川芎防天麻炙草荊芥穗當歸黃連陳皮羌類痙産後汗多即變痙者項強而身反氣息如絶宜速服加減生化湯加減生化湯專治有汗變痙者川芎麻黃根各一錢當歸四錢桂枝五分人參一錢炙草五分羌活五分天麻八分附子一片羚羊角八分如無汗類痙者中風用川芎三錢當歸一兩酒洗棗仁防風俱無份量眉批一本引用生薑一片棗一枚歌括産後汗多即變痙項強身反似角弓氣息如絶難接續加減生化速煎送加減生化止痙好歸芎附子炙甘草天麻人參麻黃根桂枝羌活羚羊角出汗凡分娩時汗出由勞傷脾驚傷心恐傷肝也産婦多兼三者而汗出不可即用斂汗之劑神定而汗自止若血塊作痛芪朮未可遽加宜服生化湯二三帖以消塊痛隨繼服加參生化湯以止虛汗若分娩後倦甚濈濈然汗出形色又脫乃亡陽脫汗也汗本亡陽陽亡則陰隨之故又當從權速灌加參生化湯倍參以救危毋拘塊痛婦人産多汗當健脾以斂水液之精益榮衛以噓血歸源灌溉四肢不使妄行雜症雖有自汗盜汗之分然當歸六黃湯不可治産後之盜汗也並宜服加參生化湯及加味補中益氣二方若服參芪而汗多不止及頭出汗而不至腰足必難療矣如汗出而手拭不及者不治産後汗出氣喘等症虛之極也不受補者不治麻黃根湯治産後虛汗不止人參二錢當歸二錢黃芪一錢半炙白朮一錢炒桂枝五分麻黃根一錢粉草五分炒牡蠣研少許浮麥一大撮虛脫汗多手足冷加黑薑四分熟附子一片渴加麥冬一錢五味十粒肥白人産後多汗加竹瀝一盞薑汁一小匙以清痰火惡風寒加防風桂枝各五分血塊不落加熟地三錢晚服八味地黃丸山茱萸山藥丹皮雲苓各八錢澤瀉五錢熟地八錢五味子五錢炙黃芪一兩煉蜜為丸陽加於陰則汗因而遇風變為瘛瘲者有之尤難治故汗多宜謹避風寒汗多小便不通乃亡津液故也勿用利水藥歌括分娩之時汗淋漓驚恐勞傷心肝脾不可驟用斂汗劑參加生化救危急麻黃根湯當歸參芪朮桂枝麻黃根牡蠣粉草浮小麥汗多服此效如神盜汗産後睡中汗出醒來即止猶盜瞰人睡而謂之盜汗非汗自至之比雜症論云自汗陽虧盜汗陰虛然當歸六黃湯又非産後盜汗方也惟兼氣血而調治之乃為得耳止汗散治産後盜汗人參二錢當歸二錢熟地一錢半麻黃根五分黃連五分酒炒浮小麥一大撮棗一枚又方牡蠣煅細末五分小麥麵炒黃研末眉批一本牡蠣小麥炒黃各五分空心調服歌括産後睡中出盜汗醒後汗止身疲倦多因陰虛邪作祟兼顧氣血並收斂産後盜汗止汗散人參當歸川黃連熟地浮麥麻黃根或用牡蠣小麥麵口渴兼小便不利産後煩躁咽乾而渴兼小便不利由失血汗多所致治當助脾益肺升舉氣血則陽升陰降水入經而為血為液谷入胃而氣長脈行自然津液生而便調利矣若認口渴為火而用芩連梔柏以降之認小便不利為水滯而用五苓散以通之皆失治也必因其勞損而溫之益之因其留滯而濡之行之則庶幾矣生津止渴益水飲人參麥冬當歸生地各三錢黃芪一錢葛根一錢升麻炙草各四分茯苓八分五味子十五粒汗多加麻黃根一錢浮小麥一大撮大便燥加肉蓯蓉一錢五分渴甚加生脈散不可疑而不用歌括産後口渴咽又乾小便不利是何緣失血汗多原致此助脾益肺效非凡生津止渴益水飲麥冬歸芪與人參生地茯苓五味子升麻炙草並葛根遺尿氣血太虛不能約束宜八珍湯加升麻柴胡甚者加熟附子一片歌括産後氣血太虛弱頻頻遺尿難固攝不可妄投收澀劑峻補氣血泉自縮産後遺尿難約束八珍湯加升柴胡甚者更入熟附片水煎溫服病可除

body:
  text: 傅青主徵君女科書後陽典傅青主先生名山前明遺老也康熙朝徵博學宏詞入都以老病丐歸故也稱為徵君先生學問深邃仰觀俯察明陰洞陽詩文皆其餘事即二氏之學亦旁參其詣其道特其末耳獨能得仲景之秘發前人所未發立方用藥平淡無奇而奏效如神山右舊族藏其女科一書由調經妊娠胎產分類訂方皆轉相抄寫嘉慶年間平陽郡有樂善者始刊以公諸世得者按症尋方無弗立效予往在山右得之繼為安省林君索去林固世於醫以為見所未見視為奇珍江西近有翻刻出錯訛甚多深虞誤人予甚之欲重刊未果壬子秋初內子蔣氏得中風右瘓疾服再造丸得生而右足行步維艱寓信於予口有勸西施佛經或敬信錄暗室燈等書以為懺悔者因思佛經同諸書往見人家不知敬重讀書人置之不閱鄉愚婦女即以是夾線是褻瀆已甚轉增過何能消災前傅青主徵君女科如識字之家當無醫之處依方服藥可以全人性命似較施印諸書為良希為圖之予得此信極以為然于山右宦陝者覓之未得施於韓寶臣刺史處得祈君爾誠所刊出內祈君詮註尤詳亟為付梓以成志雖屬有心為善但出於婦女之誠心上好生或邀默佑俾良於行未可期也因述於後時咸豐乙卯孟夏大興官彤紳樗存甫識於古長安樂知草堂

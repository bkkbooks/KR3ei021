body:
  text: 産後編下卷誤破尿胞産理不順穩婆不精誤破尿胞膀胱者用參芪為君歸芎為臣桃仁陳皮茯苓為佐豬羊尿胞煎藥百服乃安又方云用生黃絲絹一尺白牡丹皮根為末白芨末各二錢水二碗煮至絹爛如飴服之宜靜臥不可作聲名補脬飲神效患淋由産後虛弱熱客於脬中內虛頻數熱則小便淋澀作痛曰淋茅根湯凡産後冷熱淋並治之石膏一兩白茅根一兩瞿麥白茯苓各五錢葵子人參桃膠滑石各一錢石首魚頭四個燈心水煎入齒末空心服眉批一本小注載症由內虛方用石膏一兩無此治法不可拘執陳方以致誤人一本石膏作一錢無滑石一作各等分又方治産後小便痛淋血白茅根瞿麥葵子車前子通草以上俱無份量鯉魚齒一百個水煎服亦入齒末眉批按齒末疑均是鯉魚齒歌括患淋石膏茅根君瞿麥茯苓滑石參葵子桃膠石首魚燈心為引奏效神産後小便痛血淋瞿麥葵子白茅根車前通草鯉魚齒魚齒研末水煎吞便數由脬內素有冷氣因産發動冷氣入脬故也用赤石脂二兩為末空心服又方治小便數及遺尿用益智仁二十八枚為末米飲送下二錢又桑螵散桑螵蛸三十個人參黃芪鹿茸牡蠣赤石脂各三錢為末空心服二錢米飲送下歌括冷氣入脬致便數桑螵蛸散參芪多鹿茸牡蠣赤石脂研末服之泉可縮瀉産後泄瀉非雜症有食泄濕泄水穀注下之論大率氣虛食積與濕也氣虛宜補食積宜消濕則宜燥然惡露未淨遽難驟燥當先服生化湯二三帖化舊生新加茯苓以利水道俟血生然後補氣以消食燥濕以分利水道使無滯澀虛虛之失若産旬日外方論雜症尤當論虛實而治也如痛下清水腹鳴米飲不化者以寒泄治如糞水黃赤肛門作痛以熱泄治之有因飲食過多傷脾成泄氣臭如敗卵以食積治之又有脾氣久虛少食食下即鳴急盡下所食之物方覺快者以虛寒泄治之治法寒則溫之熱則清之脾傷食積分利健脾兼消補虛善為調治無失也産後虛瀉眠昏人不識弱甚形脫危症必用人參二錢白朮茯苓各二錢附子一錢方能回生若脈浮弦按之不鼓即為中寒此蓋陰先亡而陽欲去速宜大補氣血加附子黑薑以回元陽萬勿忽視加減生化湯治産後塊未消患瀉症川芎二錢茯苓二錢當歸四錢黑薑五分炙草五分桃仁十粒蓮子八枚水煎溫服健脾利水生化湯治産後塊已除患瀉症川芎一錢茯苓一錢半歸身二錢黑薑四分陳皮五分炙草五分人參三錢肉果一個製白朮一錢土炒澤瀉八分寒瀉加乾薑八分寒痛加砂仁炮薑各八分熱瀉加炒黃連八分瀉水腹痛米飲不化加砂仁八分麥芽山楂各一錢瀉有酸噯臭氣加神麯砂仁各八分脾氣久虛瀉出所食物方快以虛寒論瀉水者加蒼朮一錢以燥濕脾氣弱元氣虛必須大補佐消食清熱卻寒藥弱甚形色脫必須第一方參朮苓附必用之藥也諸瀉俱加升麻酒炒蓮子十粒歌括産後瀉泄非雜症氣虛食積濕邪生濕則宜燥食消導寒則溫之熱宜清産後瀉泄塊未散生化湯中再加減川芎當歸茯苓配黑薑桃仁炙草蓮産後塊除患瀉症健脾利水生化湯歸芎茯苓陳皮草參朮肉果澤瀉薑完穀不化因産後勞倦傷脾而運轉稽遲也名飧泄又飲食太過脾胃受傷亦然俗呼水穀痢是也然産方三日內塊未消化此脾胃衰弱參芪朮未可遽加且服生化湯加益智香砂少溫脾氣俟塊消後加參芪朮補氣肉果木香砂仁益智溫胃升麻柴胡清胃氣澤瀉茯苓陳皮以利水為上策也加味生化湯治産後三日內完穀不化塊未消者川芎一錢益智一錢當歸四錢黑薑四分炙草四分桃仁十粒茯苓一錢半眉批一本當歸作三錢有棗一枚參苓生化湯治産後三日內塊已消穀不化胎前素弱患此病者川芎一錢當歸二錢黑薑四分炙草五分人參二錢茯苓一錢白芍一錢炒益智一錢炒白朮二錢土炒肉果一個製瀉水多加澤瀉木通各八分腹痛加砂仁八分渴加麥冬五味子寒瀉加黑薑一錢木香四分食積加神麯麥芽消飯麵砂仁山楂消肉食産後瀉痢日久胃氣虛弱完穀不化宜溫助胃氣六君子湯加木香四分肉果一個製眉批一本有蓮子八枚去心棗三枚歌括産後三日塊未散勞倦傷脾運轉難或因暴食傷脾胃完穀不化飧瀉現加味生化湯川芎益智當歸白茯苓黑薑桃仁炙甘草煎服數劑瀉泄停健脾參苓生化湯歸芎炙草肉果薑白芍白朮益智仁胎前素弱此方嘗痢産後七日內外患赤白痢裡急後重頻並最為難治欲調氣行血而推蕩痢邪猶患産後元氣虛弱欲滋榮益氣而大補虛弱又助痢之邪惟生化湯減乾薑而代以木香茯苓則善消惡露而兼治痢疾並行而不相悖也再服香連丸以俟一二日後病勢如減可保無虞若産七日外有患褐花色後重頻並虛痢即當加補無疑若産婦稟厚産期已經二十餘日宜服生化湯加連芩厚朴芍藥行積之劑加減生化湯治産後七日內患痢川芎二錢當歸五錢炙草五分桃仁十二粒茯苓一錢陳皮四分木香磨三分紅痢腹痛加砂仁八分青血丸治噤口痢香連為末加蓮肉粉各一兩半和勻為丸酒送下四錢凡産三四日後塊散痢疾少減共十症開後依治一産後久瀉元氣下陷大便不禁肛門如脫宜服六君子湯加木香四分肉果一個製薑汁五分二産後瀉痢色黃乃脾土真氣虛損宜服補中益氣湯加木香肉果三産後傷麵食瀉痢宜服生化湯加神麯麥芽一本神麯麥芽下有各一錢四産後傷肉食瀉痢宜服生化湯加山楂砂仁五産後胃氣虛弱瀉痢完穀不化當溫助胃氣宜服六君子湯加木香四分肉果一個製六産後脾胃虛弱四肢浮腫宜服六君子湯加五皮散見後水腫七産後瀉痢無後重但久不止宜服六君子湯加木香肉果八産後赤白痢臍下痛當歸厚朴黃連肉果甘草桃仁川芎九産後久痢色赤屬血虛宜四物湯加荊芥人參十産後久痢色白屬氣虛宜六君子湯加木香肉果歌括産後患痢治最難清稀鴨溏定屬寒赤黃相黏定是熱寒溫熱清宜詳參生化湯中減黑薑加入茯苓廣木香惡露痢疾相兼治並行不悖法最良産後噤口青血丸兩半蓮肉木香連和勻為丸酒送下每服四錢三劑痊産後久瀉元氣損肛門如脫便不禁六君子湯加木香肉果一個薑汁吞産後久痢色白蒼病原血虛四物養再加人參與荊芥連服數劑可復康産後久痢色紅赤氣虛亦服六君子木香肉果同加入連服數劑痢自止霍亂由勞傷氣血臟腑空虛不能運化食物及感冷風所致陰陽升降不順清濁亂於脾胃冷熱不調邪正相搏上下為霍亂生化六和湯治産後血塊痛未除患霍亂川芎二錢當歸四錢黑薑炙草陳皮藿香各四分砂仁六分茯苓一錢薑三片煎附子散治産後霍亂吐瀉手足逆冷須無塊痛方可服白朮一錢當歸二錢陳皮黑薑丁香甘草各四分共為末粥飲送下二錢一本有附子五分溫中湯治産後霍亂吐瀉不止無塊痛者可服人參一錢白朮一錢半當歸二錢厚朴八分黑薑四分茯苓一錢草豆蔻六分薑三片水煎服歌括勞傷氣血臟腹空食難運化感冷風陰陽不順清濁亂冷熱不調邪正爭生化六和芎歸薑陳皮炙草砂藿香茯苓一錢薑三片産後霍亂服此方附子散中朮歸薑陳皮甘草與丁香為末二錢米飲下無瘀霍亂此方良産後霍亂溫中湯當歸厚朴參朮薑茯苓草叩片薑引水煎溫服保安康嘔逆不食産後勞傷臟腑寒邪易乘於腸胃則氣逆嘔吐而不下食也又有瘀血未淨而嘔者亦有痰氣入胃胃口不清而嘔者當隨症調之加減生化湯治産婦嘔逆不食川芎一錢當歸三錢黑薑砂仁藿香各五分淡竹葉七片水煎和薑汁二匙服歌括加減生化芎歸薑砂仁竹葉與藿香薑汁二匙和水煎嘔逆不食投此方溫胃丁香散治産後七日外嘔逆不食當歸三錢白朮二錢黑薑四分丁香四分人參一錢陳皮五分炙草五分前胡五分藿香五分薑三片水煎服歌括溫胃丁香效更彰人參白朮並黑薑陳皮前胡炙甘草當歸薑片丁藿香石蓮散治産婦嘔吐心沖目眩石蓮子去殼去心一兩半白茯苓一兩丁香五分共為細末米飲送下眉批一本有白朮無白茯苓丁香作五錢用者酌之歌括産婦嘔吐目中眩去心去殼用石蓮茯苓丁香共研末米飲送服保平安生津益液湯治産婦虛弱口渴氣少由産後血少多汗內煩不生津液人參麥冬去心茯苓一兩大棗竹葉浮小麥炙草栝蔞根大渴不止加蘆根眉批一本人參一錢麥冬茯苓三錢存參歌括生津益液用大棗參麥茯苓炙甘草竹葉小麥栝蔞根大渴再加蘆根妙咳嗽治産後七日內外感風寒咳嗽鼻塞聲重惡寒勿用麻黃以動汗嗽而脅痛勿用柴胡湯嗽而有聲痰少面赤勿用涼藥凡産有火嗽有痰嗽必須調理半月後方可用涼藥半月前不當用加味生化湯治産後外感風寒咳嗽及鼻塞聲重川芎一錢當歸二錢杏仁十粒桔梗四分知母八分有痰加半夏曲虛弱有汗咳嗽加人參總之産後不可發汗眉批知母一本作四分歌括産後七日感風寒咳嗽鼻塞亦惡寒勿用麻黃柴胡湯尚須分清火與痰風寒咳嗽鼻聲重加味生化用最靈歸芍知母桔梗杏痰加半夏虛參增加參安肺生化湯治産後虛弱旬日內外感風寒咳嗽聲重有痰或身熱頭痛及汗多者川芎一錢人參一錢知母一錢桑白皮一錢當歸二錢杏仁十粒去皮尖甘草四分桔梗四分半夏七分橘紅三分虛人多痰加竹瀝一杯薑汁半匙眉批按咳嗽論中明示縱有火嗽在半月前猶不得輕用涼藥垂戒綦嚴而第一與第二方中均有知母小注均有外感風寒云云此必於既感之後將蘊而為燥熱不得已而用之小注未及申明如謂不然苟初感即用此涼品豈不與前論顯為枘鑿讀者須會前人微意庶不致用古方而自少權衡耳歌括産後旬日感風寒咳嗽聲重亦有痰身體虛弱難御邪身熱頭痛多出汗加參安肺生化湯歸芍人參杏仁桑知母甘草桔梗配半夏橘紅共煎嘗加味四物湯治半月後乾嗽有聲痰少者川芎白芍知母栝蔞仁各一錢生地當歸各二錢訶子二錢冬花六分桔梗四分甘草四分兜鈴四分生薑一大片歌括加味四物歸芍芎生地知母苦桔梗訶子冬花栝蔞仁甘草生薑與兜鈴水腫産後水氣手足浮腫皮膚現光榮色乃脾虛不能制水腎虛不能行水也必以大補氣血為先佐以蒼朮白朮茯苓補脾壅滿用陳皮半夏香附消之虛人加人參木通有熱加黃芩麥冬以清肺金健脾利水補中益氣湯七日外用人參白朮各二錢茯苓白芍各一錢陳皮五分木瓜八分紫蘇木通大腹皮蒼朮厚朴各四分大便不通加郁李仁麻仁各一錢如因寒邪濕氣傷脾無汗而腫宜薑皮半夏蘇葉加於補氣方以表汗五皮散治産後風濕客傷脾經氣血凝滯以致面目浮虛四肢腫脹氣喘五加皮地骨皮大腹皮茯苓皮各一錢薑皮一錢棗一枚水煎服又云産後惡露不淨停留胞絡致令浮腫若以水氣治之投以甘遂等藥誤矣但服調經散則血行而腫消矣調經散沒藥另研琥珀另研各一錢肉桂赤芍當歸各一錢上為細末每服五分薑汁酒各少許調服眉批此方能調經治腹痛歌括産後風濕客脾經氣血凝滯四肢腫面目虛浮脹氣喘肺腎虛羸水難行五皮散能消水腫五加地骨大腹苓薑棗善於調營衛以皮行皮可建功惡露不行致浮腫不須治水但調經歸芍沒藥琥珀桂溫經行血水患平流注産後惡露流於腰臂足關節之處或漫腫或結塊久則腫起作痛肢體倦怠急宜用蔥尉法以治外腫內服參歸生化湯以消血滯無緩也未成者消已成者潰蔥尉法用蔥一握炙熱搗爛作餅敷痛處用厚布二三層以尉斗火尉之參歸生化湯川芎一錢半當歸二錢炙草五分人參二錢黃芪一錢半肉桂五分馬蹄香二錢此症
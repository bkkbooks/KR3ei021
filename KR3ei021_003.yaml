前胡散亦治寒痛若無塊但小腹痛亦可按而少止者屬血虛加熟地三錢前胡肉桂各一錢為末名前朝胡散歌括産後虛中感寒冷其寒下攻系腹痛治以加減生化湯當歸桃仁薑草芎虛勞指節冷痛頭汗不止人參三錢當歸三錢黃芪二錢淡豆豉十粒生薑三片韭白十寸豬腎二個先將豬腎煮熟取汁煎藥八分溫服眉批一本有或用豬胃一個先將胃略煮後再煎湯煮藥歌括頭汗不止指節痛産後虛勞此症生參芪豆薑歸韭白豬腎煮湯煎藥沖遍身疼痛産後百節開張血脈流散氣弱則經絡間血多阻滯纍日不散則筋牽脈引骨節不利故腰背不能轉側手足不能動履或身熱頭痛若誤作傷寒發表出汗則筋脈動蕩手足發冷變症出焉宜服趁痛散當歸一錢甘草黃芪白朮獨活各八分肉桂八分桑寄生一錢牛膝八分薤白五根薑三片水煎服眉批一本無桑寄生歌括百節開張産後現血脈瘀阻經絡間骨節不利腰背強遍身疼痛動履難趁痛散中君當歸黃芪白朮甘草配獨活牛膝桑寄生薤白生薑與肉桂腰痛由女人腎位系胞腰為腎腑産後勞傷腎氣損動胞絡或虛未復而風乘之也養榮壯腎湯治産後感風寒腰痛不可轉當歸二錢防風四分獨活桂心杜仲續斷桑寄生各八分生薑三片水煎服兩帖後痛未止屬腎虛加熟地三錢一本有川芎八分加味大造丸治産後日久氣血兩虛腰痛腎弱方見骨蒸條青娥丸胡桃十二個破故紙八兩酒浸炒杜仲一斤薑汁炒去絲為細末煉蜜丸淡醋湯送六十丸眉批胡桃一本作二十個歌括産後腰痛轉側難養榮壯腎疼自蠲當歸防風杜仲桂獨活寄生薑續斷腰痛驗方青娥丸胡桃杜仲故紙團壯腰補腎強筋骨淡醋湯送效更顯脅痛乃肝經血虛氣滯之故氣滯用四君子湯加青皮柴胡血虛用四物湯加柴胡人參白朮若概用香燥之藥則反傷清和之氣無所生矣補肺散治脅痛山萸當歸五味山藥黃芪川芎熟地木瓜白朮獨活棗仁各等分水煎服眉批一本山萸二錢當歸二錢五味十粒黃芪八分川芎六分熟地錢半木瓜白朮各一錢獨活八分棗仁一錢薑一片無山藥存參歌括補肺散將脅痛醫山萸山藥歸芎芪五味木瓜與獨活白朮棗仁共熟地陰痛産後起居太早産門感風作痛衣被難近身體宜用祛風定痛湯川芎一錢當歸三錢獨活防風肉桂荊芥各五分炒黑茯苓一錢地黃二錢棗二枚煎服又附陰疳陰蝕陰中瘡曰䘌瘡或痛或癢如蟲行狀膿汁淋漓陰蝕幾盡者由心腎煩鬱胃氣虛弱致氣血流滯經云諸瘡痛癢皆屬於心治當補心養腎外以藥熏洗宜用十全陰疳散川芎當歸白芍地榆甘草各等分水五碗煎二碗去渣熏日三夜四先熏後洗一方用蒲黃一升水銀二兩二味調勻搽一方用蝦蟆兔糞等分為末敷瘡一方治疳蟲食下部及五臟取東南桃枝輕打頭散以綿纏之一方用石硫黃末將縛桃枝蘸而煙燻之按此條宜與上條合看一方截一短竹筒先納陰中以桃枝燒煙燻之歌括祛風定痛治陰痛獨活肉桂與川芎當歸地黃炒荊芥大棗防風白茯苓十全陰疳散巉瘡先熏後洗外用方歸芍川芎地榆草日三夜四除痛癢惡露即繫裹兒汙血産時惡露隨下則腹不痛而産自安若腹缺溫暖或傷冷物以致惡露凝塊日久不散則虛症百出或身熱骨蒸食少羸瘦或五心煩熱月水不行其塊在兩脅動則雷鳴嘈雜暈眩發熱似瘧時作時止如此數症治者欲泄其邪先補其虛必用補中益氣湯送三消丸則元氣不損惡露可消加味補中益氣湯人參一錢白朮二錢當歸三錢黃芪一錢炙白芍一錢廣皮四分甘草四分薑棗煎服三消丸治婦人死血食積痰三等症黃連一兩一半用吳萸煎汁去渣浸炒一半用益智仁炒去益智仁不用川芎五錢萊蔔子一兩五錢炒桃仁十粒山梔青皮三稜莪朮各五錢俱用醋炒山楂一兩香附一兩童便浸炒上為末蒸餅為丸食遠服用補中益氣湯送下五六十丸或用白朮三錢陳皮五錢水一鍾煎五分送下亦可眉批此方産後傷食惡露不盡若初産惡露不下宜服生化湯加楂炭三錢每日一帖連服四劑妙歌括惡露不行諸症生食少羸瘦現骨蒸五心煩熱月水斷塊在兩脅動則鳴加味補中益氣湯參芪芍草歸棗薑白朮廣皮送三消惡露可除正不傷三消丸中黃連君芎梔稜莪青桃仁山楂香附萊蔔子連服四劑惡露盡乳癰乳頭屬足厥陰肝經乳房屬足陽明胃經若乳房臃腫結核色紅數日外腫痛潰稠膿膿盡而愈此屬膽胃熱毒氣血壅滯名曰乳癰易治若初起內結小核不紅不腫不痛積之歲月漸大如巉巖山破如熟榴難治治法痛腫寒熱宜發表散邪痛甚宜疏肝清胃膿成不潰用托裡肌肉不生膿水清稀宜補脾胃膿出及潰惡寒發熱宜補血氣飲食不進或作嘔吐宜補胃氣乳岩初起用益氣養榮湯加歸脾湯間可內消若用行氣破血之劑速亡甚矣栝蔞散治一切癰疽並治乳癰癰者六腑不和之氣陽滯於陰則生之栝蔞一個連皮搗爛生甘草五分當歸三錢乳香五分燈心炒金銀花三錢白芷一錢沒藥五分燈心炒青皮五分水煎溫服回脈散乳癰未潰時服此毒從大便出虛人不用大黃三錢半白芷八分乳香五分木香五分沒藥五分穿山甲五分蛤粉拌炒共為末人參二錢煎湯調藥末服一本大黃作三錢有人參三錢十全大補湯人參白朮黃芪熟地各三錢茯苓八分甘草五分川芎八分金銀花三錢瀉加黃連肉果渴加麥冬五味寒熱往來用馬蹄香搗散凡乳癰服薏苡仁粥好又方用烏藥軟白香辣者五錢研水一碗牛皮膠一片同煎七分溫服如孕婦腹內癰此二方可通用一本人參四味各二錢又有乳吹乃小兒飲乳口氣所吹乳汁不通壅結作痛不急治則成癰宜速服栝蔞散更以手揉散之歌括乳房臃腫皮色紅數日外潰出稠膿膽胃熱毒來作祟氣血壅滯生乳癰乳癰速服栝蔞散當歸白芷青皮甘乳香沒藥金銀花水煎溫服症自痊未潰當服回脈散山甲蛤粉共炒拌大黃白芷乳沒香人參煎湯沖藥面風甚用山羊血取色新者於新瓦上焙乾研末老酒衝下五六分為度重者用至八分其效如神又用抱不出殼雞子瓦上焙乾酒調服如治虛寒危症用藍鬚子根刮皮新瓦上焙乾研末溫服一錢為度雖危可保萬全歌括山羊血能醫風甚新瓦焙乾老酒斟重者加至八分量臨症沖服效如神不語乃惡血停蓄於心故心氣閉塞舌強不語用七珍散人參石菖蒲川芎生地各一兩辰砂五分研防風五錢細辛一錢共為細末用薄荷湯下一錢因痰氣鬱結閉口不語者用好明礬一錢水飛過沸湯送下一方治産後不語人參石蓮子去心石菖蒲各等分水煎服婦人良方云産後喑心腎虛不能發聲七珍散脾氣鬱結歸脾湯脾傷食少四君子湯氣血俱虛八珍湯不應獨參湯更不宜急加附子蓋補其血以生血若單用佛手散等破血藥誤矣歌括舌強不語用人參生地川芎與細辛防風辰砂石菖蒲方名七珍補心腎補編産後大便不通用生化湯內減黑薑加麻仁脹滿加陳皮血塊痛加肉桂元胡如燥結十日以上肛門必有燥糞用蜜棗導之煉蜜棗法用好蜜二三兩火煉滾至茶褐色先用濕桌傾蜜在桌上用手作如棗樣插肛門待欲大便去蜜棗方便又方用麻油口含竹管入肛門內吹油四五口腹內糞和即通或豬膽亦可歌括産後大便燥不通煉蜜棗法方最靈插入肛門一時許腸潤便下腑氣通治産後雞爪風桑柴灰三錢存性魚膠三錢炒手指甲十二個炒共為末黃酒送下取汗即愈歌括婦人産後雞爪風桑柴煅灰應存性魚膠指甲均須炒共為細末黃酒沖保産無憂散當歸錢半酒洗炒黑芥穗八分川芎錢半艾葉七分炒麵炒枳殼六分炙黃芪八分菟絲子錢四分酒炒厚朴七分薑炒羌活五分川貝母一錢去心白芍錢二分酒炒甘草五分薑三片溫服上方保胎每月三五服催生如神歌括保産無憂歸芎芍黃芪厚朴生甘草貝母羌活菟絲子荊艾生薑炒枳殼治遍體浮腫是脾虛水溢之過凡浮腫者可通用俱神效真縮砂仁四兩萊蔔子二兩四錢研末水浸濃取汁浸砂仁候汁盡曬乾研極細末每服一錢漸加至二錢為度淡薑湯送下歌括遍體浮腫是水淫萊蔔濃汁浸砂仁汁盡曬乾研細粉淡薑湯下效如神保産神效方未産能安臨産能催偶傷胎氣腰疼腹痛甚至見紅不止勢欲小産危急之際一服即愈再服全安臨産時交骨不開橫生逆下或子死腹中命在垂危服之奇效全當歸一錢五分酒洗紫厚朴七分薑汁炒真川芎一錢五分菟絲子一錢五分酒泡川貝母二錢去心淨煎好方和入枳殼六分麵炒川羌活六分荊芥穗八分黃芪八分蜜炙蘄艾五分醋炒炙草五分白芍一錢二分冬用二錢酒炒生薑三片水二鍾煎八分渣水一鍾煎六分産前空心預服二劑臨産隨時熱服眉批此乃仙傳奇方慎勿以庸醫輕加減其分量按保産無憂散保産神效方與編首治産祕驗良方俱相同特引論略別並存參看可也歌括同保産無憂散
